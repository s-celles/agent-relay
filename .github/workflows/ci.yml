name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt reports unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Static analysis beyond vet (staticcheck, errcheck, …) — .golangci.yml
      # is the config; `just lint` runs the same thing locally.
      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v9

      # The suite spawns a stub `claude` script, never the real CLI: no
      # credentials are needed and no tokens are ever spent. It also holds
      # docs/openapi.json against the routes the server actually registers.
      - name: test (race)
        run: go test -race ./...

      - name: build
        run: go build ./...

      # Fail on any *reachable* known vulnerability — in the standard library
      # (the toolchain in go.mod governs which stdlib is compiled in) or in the
      # one dependency. Reachability-based, so an unused-code CVE does not block.
      - name: govulncheck
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      # The Go tests check that the OpenAPI description covers every route;
      # this checks that the description is a valid OpenAPI document.
      - name: validate the OpenAPI description
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install --quiet openapi-spec-validator
          python -c "
          from openapi_spec_validator import validate
          from openapi_spec_validator.readers import read_from_filename
          spec, _ = read_from_filename('docs/openapi.json')
          validate(spec)
          print('docs/openapi.json is a valid OpenAPI 3.1 document')
          "
