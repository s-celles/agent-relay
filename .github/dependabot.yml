# Watch the Go module (one direct dependency: the A2A SDK) and the GitHub
# Actions used by CI, weekly, with grouped minor/patch updates to keep PR
# noise low.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
